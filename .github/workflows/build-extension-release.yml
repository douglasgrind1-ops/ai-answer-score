name: Build extension release zip

on:
  release:
    types: [published]

jobs:
  build-extension-zip:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create extension zip
        run: |
          cd extension
          zip -r ai-answer-score-extension.zip .

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: extension/ai-answer-score-extension.zip
