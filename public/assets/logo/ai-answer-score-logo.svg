<svg width="720" height="220" viewBox="0 0 720 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Answer Score logo">
  <defs>
    <linearGradient id="aasGradient" x1="32" y1="24" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <radialGradient id="aasGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(92 92) rotate(90) scale(72)">
      <stop stop-color="#93C5FD" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#93C5FD" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="0" y="0" width="190" height="190" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <g transform="translate(8 12)">
    <circle cx="84" cy="84" r="72" fill="url(#aasGlow)" filter="url(#softGlow)"/>
    <path
      d="M84 8
         C92 44,124 76,160 84
         C124 92,92 124,84 160
         C76 124,44 92,8 84
         C44 76,76 44,84 8Z"
      fill="url(#aasGradient)"
    />
    <circle cx="84" cy="84" r="8" fill="white" fill-opacity="0.9"/>
  </g>

  <g transform="translate(210 52)">
    <text x="0" y="40" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#0F172A">
      AI Answer
    </text>
    <text x="0" y="102" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#0F172A">
      Score
    </text>
  </g>
</svg>
